services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['dev', 'full']
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flock}
      POSTGRES_DB: ${POSTGRES_DB:-flock_dev}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-flock}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    profiles: ['full']
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flock}:${POSTGRES_PASSWORD:-flock}@postgres:5432/${POSTGRES_DB:-flock_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
