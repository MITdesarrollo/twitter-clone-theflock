services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['dev', 'full']
    environment:
      POSTGRES_USER: flock
      POSTGRES_PASSWORD: flock
      POSTGRES_DB: flock_dev
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flock']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    profiles: ['full']
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://flock:flock@postgres:5432/flock_dev
      JWT_SECRET: docker-dev-secret-min-32-characters-long-enough
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
